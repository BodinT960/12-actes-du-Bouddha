        function construireHTML(texte, vocab) {
            const cles = Object.keys(vocab).sort((a, b) => b.length - a.length);
            const correspondances = [];
            
            for (const mot of cles) {
                let idx = 0;
                while ((idx = texte.indexOf(mot, idx)) !== -1) {
                    correspondances.push({ debut: idx, fin: idx + mot.length, mot });
                    idx += 1;
                }
            }

            correspondances.sort((a, b) =>
                a.debut !== b.debut
                    ? a.debut - b.debut
                    : (b.fin - b.debut) - (a.fin - a.debut)
            );

            const retenues = [];
            let finDerniere = 0;
            for (const c of correspondances) {
                if (c.debut >= finDerniere) {
                     retenues.push(c);
                     finDerniere = c.fin;
                }
            }

            let html = '';
            let position = 0;
            for (const c of retenues) {
                if (c.debut > position) {
                    html += escapeHTML(texte.slice(position, c.debut));
                }
                const traductionEchappee = escapeAttr(vocab[c.mot]);
                const motEchappe = escapeHTML(texte.slice(c.debut, c.fin));
                html += `<span class="mot-interactif">${motEchappe}<span class="fenetre-traduction">${traductionEchappee}</span></span>`;
                position = c.fin;
            }
            if (position < texte.length) {
                html += escapeHTML(texte.slice(position));
            }
            return html;
        }

        function escapeHTML(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function escapeAttr(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        document.getElementById('texte-tibetain').innerHTML =
            `<span style="font-size: 18px; display: block; line-height: 1.8; margin-bottom: 24px; color: #555;">` + construireHTML(phraseIntro1, vocabulaire) + `</span>` +
            construireHTML(texteOriginal, vocabulaire) + 
            `\n\n<span style="font-size: 18px; display: block; line-height: 1.8; margin-top: 40px; margin-bottom: 18px; color: #555;">` + construireHTML(phraseIntro2, vocabulaire) + `</span>` +
