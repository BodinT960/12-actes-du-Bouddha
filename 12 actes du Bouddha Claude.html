            "ཤིང་":       "particule de convergence sémantique (et, avec)",
            "སྟེ་":       "particule de connexion (alors, et puis)",
            "དང་":        "et, avec (conjonction coordinative)",
            // Particules nominalisantes et obliques
            "པར་":        "particule oblique après nominalisant (pour, afin de, en tant que)",
            "བར་":        "particule oblique après nominalisant (pour, afin de, en tant que)",
            "མར་":        "particule oblique après nominalisant (vers le bas, oblique)",
            "པས་":        "particule causative / instrumentale (après nominalisant པ)",
            // Particule finale de vers
            "ལོ།":        "particule finale affirmative (fin de vers liturgique)",
            // Pluralisant
            "རྣམས་":      "particule de pluralisation",
            "རྣམས།":      "particule de pluralisation",
            // Futur
            "བྱའི་":     "auxiliaire du futur + particule génitive",
            // Particule oblique finale
            "འདིར་":      "ici, en ce lieu (demonstratif འདི་ + oblique ར)",
        };

        /**
         * Construit le HTML en une seule passe sur le texte brut.
         * Étapes :
         *  1. Trier les clés du vocabulaire par longueur décroissante (les plus
         *     longues en premier) pour favoriser les correspondances maximales.
         *  2. Parcourir le texte brut et collecter TOUTES les positions de
         *     correspondance, sans toucher au texte.
         *  3. Trier les correspondances par position de départ, puis par longueur
         *     décroissante (correspondance la plus longue prioritaire en cas d'égalité).
         *  4. Sélectionner de façon gloutonne les correspondances non chevauchantes.
         *  5. Reconstruire la chaîne HTML finale en une seule passe.
         *
         * Cette approche garantit qu'aucun span ne sera jamais imbriqué dans un autre.
         */
        function construireHTML(texte, vocab) {
            // Étape 1 : trier les clés par longueur décroissante
            const cles = Object.keys(vocab).sort((a, b) => b.length - a.length);

            // Étape 2 : collecter toutes les correspondances (position + longueur)
            const correspondances = [];
            for (const mot of cles) {
                let idx = 0;
                while ((idx = texte.indexOf(mot, idx)) !== -1) {
                    correspondances.push({ debut: idx, fin: idx + mot.length, mot });
                    idx += 1; // avancer d'un caractère pour détecter les chevauchements potentiels
                }
            }

            // Étape 3 : trier par position de départ, puis par longueur décroissante
            correspondances.sort((a, b) =>
                a.debut !== b.debut
                    ? a.debut - b.debut
                    : (b.fin - b.debut) - (a.fin - a.debut)
            );

            // Étape 4 : sélection gloutonne — ignorer toute correspondance qui
            // chevaucherait une correspondance déjà retenue
            const retenues = [];
            let finDerniere = 0;
            for (const c of correspondances) {
                if (c.debut >= finDerniere) {
                    retenues.push(c);
                    finDerniere = c.fin;
                }
            }

            // Étape 5 : construire le HTML final en une seule passe
            let html = '';
            let position = 0;
            for (const c of retenues) {
                // Texte brut entre la fin du span précédent et le début de celui-ci
                if (c.debut > position) {
                    html += escapeHTML(texte.slice(position, c.debut));
                }
                const traductionEchappee = escapeAttr(vocab[c.mot]);
                const motEchappe = escapeHTML(texte.slice(c.debut, c.fin));
                html += `<span class="mot-interactif">${motEchappe}<span class="fenetre-traduction">${traductionEchappee}</span></span>`;
                position = c.fin;
            }
            // Reste du texte après le dernier span
            if (position < texte.length) {
                html += escapeHTML(texte.slice(position));
            }
            return html;
        }

        function escapeHTML(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function escapeAttr(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        document.getElementById('texte-tibetain').innerHTML =
            construireHTML(texteOriginal, vocabulaire);
    </script>
</body>
